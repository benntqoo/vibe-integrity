# VIBE-SDD Skill Registry
# ========================
# Defines all available skills and their metadata
# Used for Agent discovery and skill routing

version: "2.0"
updated: "2026-03-21"

skills:
  - name: context-tracker
    path: ./context-tracker/SKILL.md
    domain: engineering
    priority: critical
    auto_activate:
      enabled: true
      triggers:
        - session_start: "每次对话开始"
        - before_planning: "规划前"
        - after_code_change: "代码变更后"
        - after_decision: "重大决策后"
        - task_end: "任务完成前"
    description: "Tracks AI knowledge state and confidence at every moment"
    tags: [self-awareness, monitoring, confidence, blockers]
    examples:
      - "At task BEGIN"
      - "After every meaningful action"
      - "Before task completion"

  - name: spec-workflow
    path: ./spec-workflow/SKILL.md
    domain: product
    priority: critical
    auto_activate:
      enabled: false
      triggers:
        - explicit_invocation: "明确调用"
        - requirements_clarification: "需求澄清"
        - architecture_design: "架构设计"
        - spec_creation: "SPEC 创建/更新"
    description: "Handles requirements analysis, architecture design, and SPEC creation"
    tags: [requirements, architecture, spec, design, user-stories]
    examples:
      - "User requirements are ambiguous"
      - "Need to design system architecture"
      - "Freeze requirements into SPEC"

  - name: implementation
    path: ./implementation/SKILL.md
    domain: engineering
    priority: critical
    auto_activate:
      enabled: false
      triggers:
        - explicit_invocation: "明确调用"
        - code_implementation: "代码实现"
        - bug_fix: "Bug 修复"
        - test_coverage: "测试覆盖"
        - spec_alignment: "SPEC 对齐"
    description: "Handles code implementation, debugging, testing, and SPEC alignment"
    tags: [implementation, debugging, testing, coding, tdd]
    examples:
      - "Implement a new feature"
      - "Fix a bug"
      - "Write tests for code"
      - "Check code vs SPEC alignment"

  - name: unified-workflow
    path: ./unified-workflow/SKILL.md
    domain: governance
    priority: critical
    auto_activate:
      enabled: false
      triggers:
        - explicit_invocation: "明确调用"
        - pre_commit: "提交前"
        - phase_change: "阶段变更"
        - feature_delivery: "功能交付"
    description: "Orchestrates SDD workflow, enforces Constitution rules, and maintains traceability"
    tags: [sdd, orchestration, constitution, traceability, gates, workflow]
    examples:
      - "Start a new feature delivery"
      - "Advance SDD phase"
      - "Check before commit"
      - "Verify requirements-to-code mapping"

  - name: quick
    path: ./quick/SKILL.md
    domain: engineering
    priority: medium
    auto_activate:
      enabled: false
      triggers:
        - explicit_invocation: "明确调用"
        - simple_task: "简单任务"
    description: "Handles simple, single-file changes that don't require full SDD workflow"
    tags: [quick, simple, single-file, trivial, typo, rename]
    examples:
      - "Fix a typo"
      - "Rename a variable"
      - "Add a comment"

domains:
  engineering:
    description: "Technical engineering tasks"
    color: "🔧"
  product:
    description: "Product and design tasks"
    color: "🎨"
  quality:
    description: "Quality and testing tasks"
    color: "🧪"
  governance:
    description: "Process governance and compliance"
    color: "⚖️"
