# VIBE-SDD Constitution
# ====================
# These rules are NON-NEGOTIABLE.
# Any violation blocks progress until resolved.
#
# Version: 1.0
# Created: 2026-03-21

version: "1.0"
created: "2026-03-21"
updated: "2026-03-21"

principles:
  # ─────────────────────────────────────────
  # SPEC DISCIPLINE (最高优先级)
  # ─────────────────────────────────────────
  - id: SPEC-FIRST
    name: "SPEC before Code"
    rule: "When changing features, update SPEC FIRST, then code. Never code first."
    verifiable: false
    severity: critical
    blocker_on_violation: true

  - id: SPEC-ALIGNED
    name: "Code must match SPEC"
    rule: "All code must align with SPEC-ARCHITECTURE.md and SPEC-REQUIREMENTS.md"
    verifiable: true
    checker: "vic check"
    severity: critical
    blocker_on_violation: true

  - id: SPEC-CHANGE-DETECTED
    name: "Acknowledge SPEC changes"
    rule: "If vic spec hash shows changes, read vic spec diff before continuing"
    verifiable: true
    checker: "vic spec hash"
    severity: high
    blocker_on_violation: true

  # ─────────────────────────────────────────
  # QUALITY HARD LINES (不可违反)
  # ─────────────────────────────────────────
  - id: NO-TODO-IN-CODE
    name: "No TODO/FIXME in code"
    rule: "Code must not contain TODO or FIXME comments"
    verifiable: true
    checker: "grep -rn 'TODO\\|FIXME\\|XXX' --include='*.go' --include='*.ts' --include='*.js' ."
    severity: medium
    blocker_on_violation: false

  - id: NO-CONSOLE-IN-PROD
    name: "No console.log in production"
    rule: "Production code must not contain console.log statements"
    verifiable: true
    checker: "grep -rn 'console\\.log' --include='*.ts' --include='*.js' ./cmd/ ./internal/"
    severity: medium
    blocker_on_violation: false

  - id: NO-HARDCODED-SECRETS
    name: "No hardcoded secrets"
    rule: "No API keys, tokens, passwords, or credentials in code"
    verifiable: true
    checker: "grep -rn 'api_key\\|apikey\\|password\\|secret\\|token' --include='*.go' --include='*.ts' ./cmd/ ./internal/"
    severity: critical
    blocker_on_violation: true

  - id: TESTS-REQUIRED
    name: "Tests for new features"
    rule: "New features must include tests before completion"
    verifiable: true
    checker: "vic spec gate 3"
    severity: high
    blocker_on_violation: false

  # ─────────────────────────────────────────
  # WORKFLOW DISCIPLINE (流程纪律)
  # ─────────────────────────────────────────
  - id: GATE-BEFORE-COMMIT
    name: "Gates before commit"
    rule: "All relevant gates must pass before git commit"
    verifiable: true
    checker: "vic gate check --blocking"
    severity: critical
    blocker_on_violation: true

  - id: CONTEXT-TRACKER
    name: "Track context"
    rule: "Update .vic-sdd/context.yaml after meaningful actions"
    verifiable: false
    severity: medium
    blocker_on_violation: false

  - id: NO-SKIP-CHECKLIST
    name: "No skipping session checklist"
    rule: "Never skip the Session Start Checklist in agent-prompt.md"
    verifiable: false
    severity: high
    blocker_on_violation: true

enforcement:
  on_plan_generation:
    - check: SPEC-FIRST
      description: "Confirm SPEC updated before planning"
    - check: SPEC-ALIGNED
      description: "Verify code matches SPEC"
      
  on_code_review:
    - check: NO-TODO-IN-CODE
    - check: NO-CONSOLE-IN-PROD
    - check: NO-HARDCODED-SECRETS
    - check: SPEC-ALIGNED
      
  on_commit:
    - check: GATE-BEFORE-COMMIT
    - check: TESTS-REQUIRED
      
  on_phase_change:
    - check: SPEC-ALIGNED
    - check: GATE-BEFORE-COMMIT
    - check: ALL
