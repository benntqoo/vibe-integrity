# VIBE-SDD Agent Card (Single-Agent Version)
# ==========================================
# Simplified version for single-agent workflows
# For multi-agent, see agent-card-full.yaml

name: vibe-sdd-agent
description: "VIBE-SDD single agent for spec-driven development with self-awareness"
version: "2.0"
url: "http://localhost:8080/"
defaultInputModes: ["text"]
defaultOutputModes: ["text", "markdown"]

capabilities:
  streaming: true
  pushNotifications: false
  stateTransitionHistory: true

# 5 Core Skills (consolidated from 11)
skills:
  - id: context-tracker
    name: "Context Tracker"
    description: "Tracks AI knowledge state and confidence at every moment"
    domain: engineering
    auto_activate: true
    tags: [self-awareness, monitoring, confidence]
    examples:
      - "At task BEGIN"
      - "After every meaningful action"
      - "Before task completion"

  - id: spec-workflow
    name: "SPEC Workflow"
    description: "Handles requirements analysis, architecture design, and SPEC creation"
    domain: product
    auto_activate: false
    tags: [requirements, architecture, spec, design]
    examples:
      - "User requirements are ambiguous"
      - "Need to design system architecture"
      - "Freeze requirements into SPEC"

  - id: implementation
    name: "Implementation"
    description: "Handles code implementation, debugging, testing, and SPEC alignment"
    domain: engineering
    auto_activate: false
    tags: [implementation, debugging, testing, coding]
    examples:
      - "Implement a new feature"
      - "Fix a bug"
      - "Write tests for code"
      - "Check code vs SPEC alignment"

  - id: unified-workflow
    name: "Unified Workflow"
    description: "Orchestrates SDD workflow, enforces Constitution rules, and maintains traceability"
    domain: governance
    auto_activate: false
    tags: [sdd, orchestration, constitution, traceability, gates]
    examples:
      - "Start a new feature delivery"
      - "Advance SDD phase"
      - "Check before commit"
      - "Verify requirements-to-code mapping"

  - id: quick
    name: "Quick"
    description: "Handles simple, single-file changes that don't require full SDD workflow"
    domain: engineering
    auto_activate: false
    tags: [quick, simple, single-file, trivial]
    examples:
      - "Fix a typo"
      - "Rename a variable"
      - "Add a comment"

# Workflow hints for AI
workflow_hints:
  decision_tree:
    - question: "Is this a simple, single-file change?"
      yes: quick
      no_next:
        question: "Is this a requirements/architecture/SPEC task?"
        yes: spec-workflow
        no_next:
          question: "Is this a coding/testing/debugging task?"
          yes: implementation
          no_next:
            question: "Is this a workflow/orchestration/task?"
            yes: unified-workflow
            no_next: context-tracker
