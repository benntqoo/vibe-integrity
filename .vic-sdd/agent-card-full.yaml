# VIBE-SDD Agent Card (Multi-Agent Full Version)
# ==============================================
# Full version with A2A protocol support for multi-agent workflows

name: vibe-sdd-agent
description: "VIBE-SDD agent with full multi-agent capabilities"
version: "2.0"
url: "http://localhost:8080/"
defaultInputModes: ["text"]
defaultOutputModes: ["text", "markdown"]

capabilities:
  streaming: true
  pushNotifications: true
  stateTransitionHistory: true
  multiAgent: true

# Full skill definitions with delegation support
skills:
  - id: context-tracker
    name: "Context Tracker"
    description: "Tracks AI knowledge state and confidence at every moment"
    domain: engineering
    auto_activate: true
    tags: [self-awareness, monitoring, confidence]
    examples:
      - "At task BEGIN"
      - "After every meaningful action"
    can_delegate_to: []
    protocol: internal

  - id: spec-workflow
    name: "SPEC Workflow"
    description: "Handles requirements analysis, architecture design, and SPEC creation"
    domain: product
    auto_activate: false
    tags: [requirements, architecture, spec, design, user-stories]
    examples:
      - "User requirements are ambiguous"
      - "Need to design system architecture"
    can_delegate_to:
      - requirements_agent
      - architecture_agent
      - design_agent
    protocol: a2a

  - id: implementation
    name: "Implementation"
    description: "Handles code implementation, debugging, testing, and SPEC alignment"
    domain: engineering
    auto_activate: false
    tags: [implementation, debugging, testing, coding, tdd]
    examples:
      - "Implement a new feature"
      - "Fix a bug"
      - "Write tests for code"
    can_delegate_to:
      - coding_agent
      - debugging_agent
      - qa_agent
    protocol: a2a

  - id: unified-workflow
    name: "Unified Workflow"
    description: "Orchestrates SDD workflow, enforces Constitution rules, and maintains traceability"
    domain: governance
    auto_activate: false
    tags: [sdd, orchestration, constitution, traceability, gates, workflow]
    examples:
      - "Start a new feature delivery"
      - "Advance SDD phase"
      - "Check before commit"
    can_delegate_to: []
    protocol: a2a

  - id: quick
    name: "Quick"
    description: "Handles simple, single-file changes that don't require full SDD workflow"
    domain: engineering
    auto_activate: false
    tags: [quick, simple, single-file, trivial, typo, rename]
    examples:
      - "Fix a typo"
      - "Rename a variable"
    can_delegate_to: []
    protocol: internal

# Multi-agent coordination
coordinates:
  - type: orchestrator
    name: "VIBE-SDD Orchestrator"
    description: "Coordinates all skills and manages workflow"
    skills: [spec-workflow, implementation, unified-workflow]

# A2A protocol support
a2a:
  version: "1.0"
  transport: http
  port: 8080
  endpoints:
    task: /a2a/task
    subscribe: /a2a/subscribe
    status: /a2a/status

# Authentication
authentication:
  supported: false
  type: none

# Negotiation
negotiation:
  canDelegate: true
  canCoordinate: true
  preferredProtocols: [a2a, mcp]
