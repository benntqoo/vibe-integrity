# .gitlab-ci.yml
# SDD Validation CI/CD Pipeline

stages:
  - validate
  - test
  - build

variables:
  SDD_ROOT: ${CI_PROJECT_DIR}
  PYTHON_VERSION: "3.11"

.sdd_base: &sdd_base
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install -q pyyaml

sdd_validate:
  <<: *sdd_base
  stage: validate
  script:
    - python skills/sdd-orchestrator/validate-sdd.py
  artifacts:
    paths:
      - docs/specs/
    expire_in: 1 week

sdd_validate_content:
  <<: *sdd_base
  stage: validate
  script:
    - python skills/sdd-orchestrator/validate-sdd.py --validate-content true
  allow_failure: true  # Non-blocking in non-strict mode

# Fast path for simple changes
sdd_fast_path:
  <<: *sdd_base
  stage: validate
  only:
    - tags
    - schedules
  script:
    - python skills/sdd-orchestrator/validate-sdd.py
      --config skills/sdd-orchestrator/validate-sdd.config.fast-path.json

# Feature branch validation
sdd_feature_validation:
  <<: *sdd_base
  stage: validate
  except:
    - main
    - master
  script:
    - |
      # Auto-detect fast path for small changes
      CHANGES=$(git diff --name-only $CI_MERGE_REQUEST_DIFF_BASE_SHA HEAD | wc -l)
      if [ "$CHANGES" -le 3 ]; then
        echo "Small change detected, using fast path"
        python skills/sdd-orchestrator/validate-sdd.py \
          --config skills/sdd-orchestrator/validate-sdd.config.fast-path.json
      else
        echo "Full validation"
        python skills/sdd-orchestrator/validate-sdd.py
      fi
