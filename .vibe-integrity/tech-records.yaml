- id: AUTH-001
  date: '2026-01-18'
  category: authentication
  title: 使用 JWT 进行身份验证
  context: '需要无状态的认证机制

    移动端和 Web 端都需要支持

    '
  decision: '使用 JWT (JSON Web Token)

    - 无状态，扩展性好

    - 跨平台支持

    - 标准协议

    '
  alternatives_considered:
  - 'Session: 需要服务端存储，不适合分布式'
  - 'OAuth2: 过度设计，MVP 不需要第三方登录'
  reason: 简单有效，适合 REST API
  impact: medium
  status: completed
  from_version: null
  to_version: JWT (jsonwebtoken 9.0)
  related_files:
  - src/services/jwt.service.ts
  - src/auth/verify-token.ts
  notes: '当前 token 有效期: 1 小时

    计划添加 refresh token 机制

    '
- id: AUTH-002
  date: '2026-03-10'
  category: authentication
  title: 添加 Refresh Token 机制
  context: '当前 token 1 小时过期

    用户需要频繁重新登录，体验差

    '
  decision: '添加 refresh token

    - Access token: 1 小时有效期

    - Refresh token: 7 天有效期

    - 定期刷新，保持登录状态

    '
  alternatives_considered:
  - '延长 access token: 安全风险高'
  - 'Session: 需要服务端存储'
  reason: 平衡安全性和用户体验
  impact: medium
  status: completed
  from_version: JWT 单一 token
  to_version: JWT + Refresh Token
  related_files:
  - src/auth/refresh-token.ts
  - src/services/jwt.service.ts
  notes: 'Refresh token 存储在 httpOnly cookie

    需要实现 token 轮换机制

    '
