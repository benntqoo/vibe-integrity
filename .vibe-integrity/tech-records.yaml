- id: DB-001
  date: '2026-01-15'
  category: database
  title: 选择 SQLite 作为 MVP 数据库
  context: '项目处于 MVP 阶段，需要快速启动

    团队规模小，无需高并发

    '
  decision: '使用 SQLite 作为开发数据库

    - 零配置，易于启动

    - 文件存储，无需数据库服务

    - 适合 MVP 快速迭代

    '
  alternatives_considered:
  - 'PostgreSQL: 需要额外服务，配置复杂'
  - - MongoDB: 不适合关系型数据"
  reason: MVP 阶段优先速度，SQLite 足够
  impact: low
  status: completed
  from_version: null
  to_version: SQLite 3
  migration_needed: true
  migration_path: SQLite → PostgreSQL (beta 阶段)
  related_files:
  - prisma/schema.prisma
  - docker-compose.yml
  notes: 计划在 beta 阶段迁移到 PostgreSQL
