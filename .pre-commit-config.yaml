# Pre-commit Configuration
# =======================
# 
# Install:
#   pip install -r requirements.txt
#   pre-commit install
#   pre-commit install --hook-type commit-msg
#
# Run manually:
#   pre-commit run --all-files
#
# Skip for single commit:
#   git commit --no-verify -m "message"

default_stages: [pre-commit]
default_language_version:
  python: python3.11

ci:
  autofix_prs: true
  autofix_commit_msg: "chore: auto-fix pre-commit issues"
  skip: [vibe-integrity-check, code-alignment-check]

repos:
  # ============================================
  # LOCAL HOOKS - Project-specific checks
  # ============================================
  - repo: local
    hooks:
      # VIBE INTEGRITY - AI Completion Integrity Check
      - id: vibe-integrity-check
        name: Vibe Integrity (Full Validation)
        entry: python cmd/vic/vic validate
        language: system
        types: [python, javascript, typescript]
        pass_filenames: false
        always_run: true
        verbose: true
        description: "Run full vibe-integrity validation (code alignment + event folding)"

      # CODE ALIGNMENT - Decision vs Code Check
      - id: code-alignment-check
        name: Code Alignment Check
        entry: python cmd/vic/vic check
        language: system
        types: [yaml]
        files: '\.vibe-integrity/.*\.yaml$'
        pass_filenames: false
        verbose: true
        description: "Verify code matches tech decisions in .vibe-integrity/"

      # YAML VALIDATION
      - id: yaml-validate
        name: Validate YAML files
        entry: python -c "import yaml, sys; [yaml.safe_load(open(f)) for f in sys.argv[1:]]"
        language: system
        types: [yaml]
        description: "Validate YAML syntax"

  # ============================================
  # PRE-COMMIT HOOKS - Standard checks
  # ============================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Whitespace and formatting
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]

      # File checks
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
      - id: check-merge-conflict
      - id: check-case-conflict

      # Security
      - id: detect-private-key

      # Python
      - id: debug-statements
        files: \.py$

  # ============================================
  # COMMIT MESSAGE LINTING
  # ============================================
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.18.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']
