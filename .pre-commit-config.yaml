# Pre-commit Configuration for VIBE-SDD
# ===========================================
# 
# This configuration enforces VIBE-SDD workflow through pre-commit hooks.
# 
# Install:
#   pre-commit install
#   pre-commit install --hook-type commit-msg
#
# Run manually:
#   pre-commit run --all-files
#   pre-commit run vic-gate-check  # Run only VIBE-SDD gates
#
# Skip for emergency bypass:
#   git commit --no-verify -m "emergency: bypass gates"
#   ⚠️ Use sparingly - bypassing gates defeats the purpose

default_stages: [pre-commit]
default_language_version:
  python: python3.11

ci:
  autofix_prs: false
  skip: []

repos:
  # ============================================
  # VIBE-SDD GATE CHECKS (BLOCKING)
  # ============================================
  - repo: local
    hooks:
      # Gate Check - Block commits until all Gates pass
      - id: vic-gate-check
        name: VIBE-SDD Gate Check
        entry: ./cmd/vic-go/vic gate check
        language: system
        types: [go, python, javascript, typescript, yaml, markdown]
        pass_frozen: false
        always_run: false  # Only run when relevant files change
        verbose: true
        stages: [pre-commit]
        description: |
          VIBE-SDD Gate Check - verifies all gates passed before commit.
          Gate 0: Requirements complete
          Gate 1: Architecture complete
          Gate 2: Code aligns with SPEC
          Gate 3: Test coverage adequate

      # SPEC Integrity Check - Detect drift
      - id: vic-spec-drift
        name: VIBE-SDD SPEC Drift Check
        entry: ./cmd/vic-go/vic check
        language: system
        types: [go, python, javascript, typescript]
        pass_frozen: false
        always_run: true
        verbose: true
        stages: [pre-commit]
        description: |
          Detect when code drifts from SPEC declarations.
          Warns if new tech detected that's not in SPEC.

  # ============================================
  # YAML VALIDATION
  # ============================================
  - repo: local
    hooks:
      - id: yaml-validate
        name: Validate YAML files
        entry: python -c "import yaml, sys; [yaml.safe_load(open(f)) for f in sys.argv[1:]]"
        language: system
        types: [yaml]
        description: Validate YAML syntax

  # ============================================
  # STANDARD PRE-COMMIT HOOKS
  # ============================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Whitespace and formatting
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]

      # File checks
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
      - id: check-merge-conflict
      - id: check-case-conflict

      # Security
      - id: detect-private-key

      # Python
      - id: debug-statements
        files: \.py$

  # ============================================
  # COMMIT MESSAGE LINTING
  # ============================================
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.18.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']
